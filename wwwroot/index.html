<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bulletin Board</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>〓 The Bulletin Board 〓</h1>
        <div id="auth-section">
            <span id="user-info"></span>
            <button id="logout-btn" hidden>Logout</button>
        </div>

        <main>
            <section id="auth-view">
                <div class="auth-container">
                    <div class="auth-form">
                        <span id="auth-form">
                            <h2>Login</h2>
                            <input type="email" id="login-email" placeholder="Email">
                            <input type="password" id="login-password" placeholder="Password">
                            <button id="login-btn">Login</button>
                    </div>

                    <div class="auth-form">
                        <h2>Register</h2>
                        <input type="text" id="register-name" placeholder="Name">
                        <input type="text" id="register-handle" placeholder="@handle">
                        <input type="text" id="register-email" placeholder="Email">
                        <input type="text" id="register-password" placeholder="Password">
                        <button id="register-btn">Register</button>
                    </div>
                </div>
            </section>

            <section id="posts-view">
                <div id="create-post-form">
                    <input type="text" id="post-title" name="Title">
                    <textarea id="post-text" placeholder="What's on your mind today?"></textarea>
                    <input type="text" id="post-category" placeholder="Category">
                    <button id="create-post-btn">Post</button>
                </div>

                <h2>The latest posts</h2>
                <div id="posts-container"></div>
            </section>

            <section id="single-post-view" hidden>
                <button id="back-to-posts">⬅︎ Back to posts</button>
                <div id="single-post-container"></div>

                <div id="responses-section">
                    <h3>Responses</h3>
                    <div id="responses-container"></div>  

                <div id="add-response-form">
                    <textarea id="response-text" placeholder="Respond to post"></textarea>
                    <button id="add-response-btn">Post response</button>
                </div>
            </section>
        </main>
        <script src="js/app.js"></script>
    </header>
</body>
</html>
